specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Apple Pay
providerId: apple-pay
publisherName: Apple Inc.
serviceCategory: Payments / Digital Wallet
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Payments
  - Apple
description: 'FOCUS-aligned FinOps view for Apple Pay: Apple does not charge merchants directly. Direct
  Apple-billed cost is limited to the annual Apple Developer Program fee ($99/year individual or organization,
  $299/year enterprise). All transaction-level economics live with the merchant''s payment processor (Stripe,
  Adyen, Braintree, etc.) — Apple Pay is a tokenization layer on top, not a separately metered service.'
sources:
  - https://developer.apple.com/apple-pay/
  - https://developer.apple.com/programs/
billingModel:
  pricingCategory: No-Charge (Free for Merchants) + Annual Membership Prerequisite
  billingFrequency: Annual (Developer Program)
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
focusColumns:
  ServiceName: Apple Pay
  ServiceCategory: Payments / Digital Wallet
  ProviderName: Apple
  PublisherName: Apple Inc.
  InvoiceIssuerName: Apple Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription (prerequisite only)
meters:
  - name: developer_program_membership
    description: Annual Apple Developer Program membership required for Merchant ID and certificates
    unit: year
    aggregation: sum
    dimensions:
      - membership_type
      - team_id
  - name: apple_pay_transactions
    description: Count of completed Apple Pay transactions (telemetry; billed by underlying processor,
      not Apple)
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant_id
      - country
      - card_brand
  - name: merchant_validation_calls
    description: Calls to apple-pay-gateway.apple.com for merchant session creation
    unit: request
    aggregation: sum
    dimensions:
      - merchant_id
      - environment
  - name: processor_fees
    description: Processor-billed fees on Apple Pay transactions (allocated to the same FinOps domain
      as other card spend)
    unit: transaction
    aggregation: sum
    dimensions:
      - processor
      - merchant_id
principles:
  - name: Visibility
    description: Track Apple Pay transaction volume in App Store Connect and via the merchant's payment
      processor dashboards (Stripe, Adyen, Braintree). Apple-side charges are limited to the developer
      program invoice.
  - name: Allocation
    description: Allocate the developer program fee to the engineering org owning the Apple ecosystem
      footprint; allocate transaction processor fees per merchant ID / business unit.
  - name: Optimization
    description: Use the Apple Developer Enterprise Program only when distributing in-house apps; otherwise
      consolidate teams under a single Organization membership. Negotiate processor blended rates that
      include Apple Pay token volume.
  - name: Accountability
    description: Mobile / Web Engineering owns the Apple Developer Program account and Merchant ID lifecycle;
      Finance / Payments team owns processor contracts and chargeback monitoring.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
