specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Apple Pay
providerId: apple-pay
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Payments
  - Mobile Payments
  - Digital Wallet
  - Apple
description: Apple does not charge merchants or developers a fee to integrate or use Apple Pay. There
  are no per-transaction fees, no API tier prices, and no separate Apple Pay subscription. The merchant
  pays only their normal payment-processor fees (Stripe, Adyen, Braintree, etc.) plus the standard $99/year
  Apple Developer Program membership required to register a Merchant ID and obtain merchant-validation
  certificates. Apple Pay JS API and PassKit are entitlements of the developer membership.
notes: 'Apple Pay itself is free; transaction economics are entirely on the underlying card processor.'
sources:
  - https://developer.apple.com/apple-pay/
  - https://developer.apple.com/programs/
plans:
  - id: apple-pay-merchant
    name: Apple Pay Merchant Integration
    type: freemium
    description: Free integration with Apple Pay JS API (web) and PassKit (iOS/watchOS/macOS) for any
      merchant with an Apple Developer account and a registered Merchant ID.
    entries:
      - label: Apple Pay merchant fee
        name: apple_pay_fee
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Underlying processor fee
        name: processor_fee
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see merchant's payment processor
        userMultiplied: false
    elements:
      - name: Apple Pay JS API
      - name: PassKit framework
      - name: Wallet button assets
      - name: Sandbox testing
      - name: Merchant ID registration (via Apple Developer)
  - id: apple-pay-developer-program
    name: Apple Developer Program (prerequisite)
    type: subscription
    description: Annual Apple Developer Program membership required to register a Merchant ID and obtain
      certificates for Apple Pay.
    entries:
      - label: Individual / Organization membership
        name: developer_program_individual
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: $99/year
        userMultiplied: false
      - label: Apple Developer Enterprise Program
        name: developer_program_enterprise
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: $299/year
        userMultiplied: false
    elements:
      - name: Merchant ID registration
      - name: Apple Pay merchant identity certificates
      - name: Sandbox tester accounts
      - name: TestFlight / App Store distribution
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
