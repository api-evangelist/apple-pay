name: Apple Pay
description: >-
  Apple Pay enables secure, frictionless payments in apps and on the web using the
  payment cards stored in users' Apple Wallet. It supports Touch ID, Face ID, and
  Apple Watch authentication for both in-person and online payments. Apple Pay is
  available on iOS, watchOS, macOS, and via Safari on the web through the Apple Pay
  JS API, with a PassKit native framework for iOS/watchOS app integration.
image: https://developer.apple.com/assets/elements/icons/apple-pay/apple-pay-96x96.png
created: '2024-01-01'
modified: '2026-04-19'
url: https://developer.apple.com/apple-pay/
specificationVersion: '0.18'
tags:
  - Apple
  - Contactless Payments
  - Digital Wallet
  - E-Commerce
  - Mobile Payments
  - Payments
apis:
  - name: Apple Pay JS API
    description: >-
      Server-side REST API for Apple Pay on the Web, enabling merchants to validate
      their identity with Apple and obtain payment sessions used by the ApplePaySession
      JavaScript API in Safari. Supports Touch ID and Face ID for frictionless web checkout.
    image: https://developer.apple.com/assets/elements/icons/apple-pay/apple-pay-96x96.png
    humanURL: https://developer.apple.com/documentation/apple_pay_on_the_web
    baseURL: https://apple-pay-gateway.apple.com
    tags:
      - Javascript
      - Safari
      - Web Payments
    properties:
      - type: Documentation
        url: https://developer.apple.com/documentation/apple_pay_on_the_web
      - type: GettingStarted
        url: https://developer.apple.com/apple-pay/implementation/
      - type: APIReference
        url: https://developer.apple.com/documentation/apple_pay_on_the_web/applepaypaymentrequest
      - type: Sandbox
        url: https://developer.apple.com/apple-pay/sandbox-testing/
      - type: OpenAPI
        url: openapi/apple-pay-js-openapi.yml
      - type: JSONSchema
        url: json-schema/apple-pay-payment-request-schema.json
        title: Payment Request Schema
    contact:
      - FN: Apple Developer Support
        email: developer@apple.com
        url: https://developer.apple.com/contact/
  - name: PassKit Framework (Apple Pay)
    description: >-
      Native iOS, watchOS, and macOS framework for integrating Apple Pay into mobile
      and desktop applications. Provides PKPaymentRequest and PKPaymentAuthorizationViewController
      for in-app Apple Pay checkout.
    image: https://developer.apple.com/assets/elements/icons/apple-pay/apple-pay-96x96.png
    humanURL: https://developer.apple.com/documentation/passkit
    baseURL: Native Framework
    tags:
      - iOS
      - Mobile
      - Native
      - Swift
    properties:
      - type: Documentation
        url: https://developer.apple.com/documentation/passkit/apple_pay
      - type: APIReference
        url: https://developer.apple.com/documentation/passkit/pkpaymentrequest
      - type: CodeExamples
        url: https://developer.apple.com/documentation/passkit/apple_pay/offering_apple_pay
        title: Sample Code
      - type: YouTube
        url: https://developer.apple.com/videos/frameworks/wallet-and-apple-pay
  - name: Apple Pay Payment Token API
    description: >-
      Server-side specification for processing and decrypting Apple Pay payment tokens
      received from client applications. Tokens use EC_v1 or RSA_v1 encryption and
      contain the payment authorization data for charge processing.
    image: https://developer.apple.com/assets/elements/icons/apple-pay/apple-pay-96x96.png
    humanURL: https://developer.apple.com/documentation/passkit/apple_pay/payment_token_format_reference
    baseURL: Merchant Server
    tags:
      - Encryption
      - Payment Processing
      - Server-Side
    properties:
      - type: Documentation
        url: https://developer.apple.com/documentation/passkit/apple_pay/payment_token_format_reference
      - type: OpenAPI
        url: openapi/apple-pay-payment-token-openapi.yml
      - type: JSONSchema
        url: json-schema/apple-pay-payment-token-schema.json
        title: Payment Token Schema
