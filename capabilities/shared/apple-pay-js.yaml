naftiko: "1.0.0-alpha1"

info:
  label: Apple Pay JS API
  description: >-
    Server-side REST API for Apple Pay on the Web. Merchants call Apple's payment
    gateway to validate merchant identity and obtain payment sessions for use with
    the ApplePaySession JavaScript API in Safari.
  tags:
    - Apple Pay
    - Payments
    - E-Commerce
    - Web Payments
    - Mobile Payments
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      APPLE_PAY_MERCHANT_CERT: APPLE_PAY_MERCHANT_CERT

capability:
  consumes:
    - type: http
      namespace: apple-pay-js
      baseUri: "https://apple-pay-gateway.apple.com/paymentservices"
      description: Apple Pay JS API for merchant validation and payment session management
      authentication:
        type: apikey
        key: X-Apple-Merchant-Certificate
        value: "{{APPLE_PAY_MERCHANT_CERT}}"
        placement: header
      resources:
        - name: payment-session
          path: /paymentSession
          description: Merchant validation and payment session creation
          operations:
            - name: request-payment-session
              method: POST
              description: Validates merchant identity and returns a payment session object
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  merchantIdentifier: "{{tools.merchantIdentifier}}"
                  domainName: "{{tools.domainName}}"
                  displayName: "{{tools.displayName}}"

        - name: merchant-domains
          path: /merchantDomains
          description: Merchant domain registration
          operations:
            - name: register-merchant-domain
              method: POST
              description: Registers a domain for Apple Pay on the Web
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  domainName: "{{tools.domainName}}"

  exposes:
    - type: rest
      port: 8100
      namespace: apple-pay-js-api
      resources:
        - path: /v1/payment-sessions
          name: payment-sessions
          description: Apple Pay payment session management
          operations:
            - method: POST
              name: request-payment-session
              description: Request an Apple Pay payment session for merchant validation
              call: "apple-pay-js.request-payment-session"
              with:
                merchantIdentifier: "rest.merchantIdentifier"
                domainName: "rest.domainName"
                displayName: "rest.displayName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: apple-pay-js-mcp
      transport: http
      tools:
        - name: request-payment-session
          description: Requests an Apple Pay merchant validation session from Apple's gateway
          hints:
            readOnly: false
            destructive: false
          call: "apple-pay-js.request-payment-session"
          with:
            merchantIdentifier: "tools.merchantIdentifier"
            domainName: "tools.domainName"
            displayName: "tools.displayName"
          outputParameters:
            - type: object
              mapping: "$."

        - name: register-merchant-domain
          description: Registers a merchant domain for Apple Pay on the Web
          hints:
            readOnly: false
            destructive: false
          call: "apple-pay-js.register-merchant-domain"
          with:
            domainName: "tools.domainName"
          outputParameters:
            - type: object
              mapping: "$."
